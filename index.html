<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GraphLab Engine</title>

<link rel="stylesheet" href="style.css">

<!-- 🧿 sci-fi favicon -->
<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<defs>
<radialGradient id='g'>
<stop offset='0%' stop-color='%2300ffcc'/>
<stop offset='100%' stop-color='%23001111'/>
</radialGradient>
</defs>
<rect width='100' height='100' fill='black'/>
<circle cx='50' cy='50' r='35' fill='url(%23g)'/>
<circle cx='50' cy='50' r='12' fill='black'/>
</svg>">

</head>

<body>

<div id="ui">
    <div class="title">GRAPH ENGINE //</div>

    <input id="expr" placeholder="Enter math equation:" />

    <div class="row">
        <button onclick="draw()">DRAW</button>
        <button onclick="zoom(1.2)">+</button>
        <button onclick="zoom(0.8)">-</button>
    </div>

    <div id="cursor">x: 0, y: 0</div>
</div>

<canvas id="c" width="900" height="600"></canvas>

<script src="app.js"></script>

</body>
</html>
