<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GraphLab</title>

    <link rel="stylesheet" href="style.css">

    <link rel="icon" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
        <defs>
            <radialGradient id='g'>
                <stop offset='0%' stop-color='%2300ffcc'/>
                <stop offset='100%' stop-color='%23001111'/>
            </radialGradient>
        </defs>
        <rect width='100' height='100' fill='black'/>
        <circle cx='50' cy='50' r='35' fill='url(%23g)'/>
        <circle cx='50' cy='50' r='10' fill='black'/>
    </svg>">

</head>

<body>

<div id="ui">
    <h1>GRAPH LAB //</h1>

    <input id="expr" placeholder="Enter math equations: x^2, sin(x), x*x" />

    <div class="buttons">
        <button onclick="drawGraph()">DRAW</button>
        <button onclick="zoomIn()">+</button>
        <button onclick="zoomOut()">-</button>
    </div>

    <div id="coords">x: 0, y: 0</div>
</div>

<canvas id="canvas" width="900" height="600"></canvas>

<script src="app.js"></script>

</body>
</html>
